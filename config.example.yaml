matrix:
  homeserver: "https://matrix.example.com"
  user_id: "@recording-bot:example.com"
  password: "bot-password"
  pickle_key: "random-secret-string"

livekit:
  url: "http://livekit-server:7880"
  api_key: "your-livekit-api-key"
  api_secret: "your-livekit-api-secret"
  jwt_service_url: "http://livekit-jwt-service:8080"

recording:
  output_dir: /recordings
  default_mode: screen
  max_video_height: 720
  max_concurrent: 1

webhook:
  listen: ":8080"
  path: /webhook

layouts:
  listen: ":8080"
  path: /layouts/
  base_url: "http://matrix-recording-bot:8080/layouts/screen.html"

